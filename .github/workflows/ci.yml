name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run synthetic demo
        run: python experiments/demo_synthetic.py --output-dir results/ci-demo

      - name: Run baseline smoke test
        run: python scripts/run_baselines.py --dataset-config results/ci-demo/synthetic_dataset.yaml --output-dir results/ci-demo/baselines

