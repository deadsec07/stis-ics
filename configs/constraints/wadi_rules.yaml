rules:
  - name: inlet_valve_without_flow_response
    type: expected_response
    trigger_column: 1_MV_001
    response_column: 1_FIT_001
    lag: 2
    min_delta: 0.3
    weight: 1.5

  - name: pressure_rises_with_pump_off
    type: unexpected_rise
    control_column: 2_P_001
    observed_column: 2_PIT_001
    control_off_value: 0
    lag: 2
    max_delta: 0.2
    weight: 2.0

  - name: level_drops_despite_inlet
    type: balance_consistency
    level_column: 1_LIT_001
    inlet_column: 1_MV_001
    outlet_column: 2_P_001
    inlet_on_value: 1
    outlet_off_value: 0
    lag: 2
    tolerance: 0.1
    weight: 1.2
