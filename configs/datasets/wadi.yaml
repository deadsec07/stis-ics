name: wadi
train_path: data/raw/WADI_train.csv
test_path: data/raw/WADI_test.csv
timestamp_column: Timestamp
label_column: Attack
timestamp_format:
sort_by_time: true
fill_method: ffill_bfill
sensor_columns:
  - 1_FIT_001
  - 1_LIT_001
  - 2_PIT_001
actuator_columns:
  - 1_MV_001
  - 2_P_001
context_columns:
  - plant_mode
feature_columns:
  - 1_FIT_001
  - 1_LIT_001
  - 2_PIT_001
  - 1_MV_001
  - 2_P_001
  - plant_mode
threshold:
  method: percentile
  percentile: 99.0
scoring:
  alpha: 1.0
  beta: 1.1
  gamma: 1.2
  epsilon: 1.0e-6
  deviation_method: mad
  rolling_window: 50
discretizer:
  strategy: quantile
  bins: 4
  columns:
    - 1_MV_001
    - 2_P_001
    - plant_mode
    - 1_FIT_001
attack_intervals_path:
